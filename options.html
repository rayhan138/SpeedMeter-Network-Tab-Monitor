<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SpeedMeter Settings</title>
    <link rel="icon" type="image/x-icon" href="icon.ico" />
    <link rel="icon" type="image/png" href="icon.png" />
    <style>
      body {
        margin: 0;
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      .wrap {
        max-width: 760px;
        margin: 32px auto;
        padding: 0 20px 40px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .sub {
        color: #94a3b8;
        margin-bottom: 24px;
      }

      .card {
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 16px;
      }

      .row {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 16px;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      }

      .row:last-child {
        border-bottom: none;
      }

      label.title {
        font-weight: 600;
      }

      .hint {
        color: #94a3b8;
        font-size: 12px;
        margin-top: 4px;
      }

      input[type="range"] {
        width: 100%;
      }

      input[type="number"],
      select {
        width: 220px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: #020617;
        color: #e2e8f0;
      }

      .checks {
        display: grid;
        gap: 8px;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }

      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: #0ea5e9;
        color: white;
        cursor: pointer;
        font-weight: 600;
      }

      button.secondary {
        background: transparent;
      }

      #status {
        margin-top: 12px;
        color: #67e8f9;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>SpeedMeter Settings</h1>
      <div class="sub">
        Upload and some memory values are estimated. Hotkey can be changed in Chrome shortcut settings.
      </div>

      <div class="card">
        <div class="row">
          <div>
            <label class="title" for="overlayVisible">Overlay visible</label>
            <div class="hint">Toolbar icon and hotkey can toggle this anytime.</div>
          </div>
          <div><input id="overlayVisible" type="checkbox" /></div>
        </div>

        <div class="row">
          <div>
            <label class="title" for="opacity">Opacity</label>
            <div class="hint">20% to 100%</div>
          </div>
          <div>
            <input id="opacity" type="range" min="20" max="100" step="1" />
            <div id="opacityValue"></div>
          </div>
        </div>

        <div class="row">
          <div>
            <label class="title" for="theme">Theme</label>
          </div>
          <div>
            <select id="theme">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="ocean">Ocean</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label class="title" for="tabsToShow">Tabs to show</label>
            <div class="hint">From 5 to 10</div>
          </div>
          <div>
            <select id="tabsToShow">
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label class="title" for="memoryThresholdMB">Memory alert threshold</label>
            <div class="hint">Default: 500 MB</div>
          </div>
          <div>
            <input id="memoryThresholdMB" type="number" min="50" step="10" />
          </div>
        </div>

        <div class="row">
          <div>
            <div class="title">Visible metrics</div>
          </div>
          <div class="checks">
            <label><input id="metricBandwidth" type="checkbox" /> Bandwidth</label>
            <label><input id="metricTabs" type="checkbox" /> Top tabs</label>
            <label><input id="metricTotals" type="checkbox" /> Session totals</label>
            <label><input id="metricHistory" type="checkbox" /> History graphs</label>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="saveBtn">Save</button>
        <button id="resetBtn" class="secondary">Reset defaults</button>
        <button id="shortcutsBtn" class="secondary">Open shortcut settings</button>
      </div>

      <div id="status"></div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
